spring.application.name=api-gateway
server.port=8081

# Eureka Registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.healthcheck.enabled=true
eureka.instance.lease-renewal-interval-in-seconds=5

# Gateway Routing Logic
spring.cloud.gateway.routes[0].id=notification-service
spring.cloud.gateway.routes[0].uri=lb://NOTIFICATION-ALERTS-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/notifications/**

# Logging to help us debug
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.http.server.reactive=DEBUG