spring.application.name=api-gateway
server.port=9091

spring.config.import=configserver:http://localhost:1234

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=research-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://research-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/research/**

spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].predicates=Path=/healthGov/**
spring.cloud.gateway.server.webflux.routes[1].uri=lb://auth-service