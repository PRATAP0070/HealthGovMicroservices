spring.application.name=api-gateway
server.port=9091

spring.config.import=optional:configserver:http://localhost:1234

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=research-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://research-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/research/**

spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/healthGov/**
spring.cloud.gateway.server.webflux.routes[1].uri=lb://auth-service

spring.cloud.gateway.server.webflux.routes[2].id=research-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://research-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/manager/**

spring.cloud.gateway.server.webflux.routes[3].id=citizen-health-profile-service
spring.cloud.gateway.server.webflux.routes[3].predicates=Path=/citizen/**
spring.cloud.gateway.server.webflux.routes[3].uri=lb://citizen-health-profile-service

spring.cloud.gateway.server.webflux.routes[4].id=infrastructure-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://infrastructure-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/infrastructures/**

spring.cloud.gateway.server.webflux.routes[5].id=resource-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://resource-service
spring.cloud.gateway.server.webflux.routes[5].predicates=Path=/resources/**

spring.cloud.gateway.server.webflux.routes[6].id=health-program-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://health-program-service
spring.cloud.gateway.server.webflux.routes[6].predicates=Path=/api/programs/**

