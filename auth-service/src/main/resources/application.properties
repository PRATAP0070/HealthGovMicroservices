spring.application.name=auth-service
server.port=9999

# ===============================================
# 1. FIX: DISABLE CONFIG SERVER (Prevents the 'No spring.config.import' error)
# ===============================================
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
# If the error persists, you can also use this "dummy" import:
# spring.config.import=optional:configserver:

# ===============================================
# 2. DATABASE SETTINGS (Update password to YOUR local MySQL password)
# ===============================================
spring.datasource.url=jdbc:mysql://localhost:3306/auth_service_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=2003

# ===============================================
# 3. JPA / HIBERNATE
# ===============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================================
# 4. EUREKA & SECURITY
# ===============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
