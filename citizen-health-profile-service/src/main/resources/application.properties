spring.application.name=citizen-health-profile-service
spring.datasource.url=jdbc:mysql://localhost:3306/healthgov_db?createDatabaseIfNotExist=true

spring.config.import=optional:configserver:http://localhost:1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
server.port=6789