spring.application.name=compliance-audit-service

server.port=5050

spring.datasource.url=jdbc:mysql://localhost:3306/compliance_audit_db?createDatabaseIfNotExist=true

spring.config.import=optional:configserver:http://localhost:1234

#logging.file.name=logs/Compliance-Audits.log


logging.level.feign=DEBUG
logging.level.com.healthgov.feignclients=DEBUG


# =====================================================
# FEIGN CLIENT TIMEOUTS (VERY IMPORTANT)
# =====================================================
feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=3000
feign.client.config.default.loggerLevel=basic


# =====================================================
# RESILIENCE4J - CIRCUIT BREAKER
# =====================================================

# ---- Auth Service ----
resilience4j.circuitbreaker.instances.authServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.authServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.authServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.authServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.authServiceCB.permittedNumberOfCallsInHalfOpenState=3

# ---- Research Service ----
resilience4j.circuitbreaker.instances.researchServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.researchServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.researchServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.researchServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.researchServiceCB.permittedNumberOfCallsInHalfOpenState=3

# ---- Health Program Service ----
resilience4j.circuitbreaker.instances.programServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.programServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.programServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.programServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.programServiceCB.permittedNumberOfCallsInHalfOpenState=3

# ---- Notification Service ----
resilience4j.circuitbreaker.instances.notificationServiceCB.slidingWindowSize=5
resilience4j.circuitbreaker.instances.notificationServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.notificationServiceCB.waitDurationInOpenState=5s


# =====================================================
# RESILIENCE4J - RETRY (Transient Failures)
# =====================================================

resilience4j.retry.instances.authServiceCB.maxAttempts=3
resilience4j.retry.instances.authServiceCB.waitDuration=1s

resilience4j.retry.instances.researchServiceCB.maxAttempts=3
resilience4j.retry.instances.researchServiceCB.waitDuration=1s

resilience4j.retry.instances.programServiceCB.maxAttempts=3
resilience4j.retry.instances.programServiceCB.waitDuration=1s

resilience4j.retry.instances.notificationServiceCB.maxAttempts=2
resilience4j.retry.instances.notificationServiceCB.waitDuration=500ms


# =====================================================
# RESILIENCE4J - BULKHEAD (Resource Isolation)
# =====================================================

resilience4j.bulkhead.instances.authServiceCB.maxConcurrentCalls=10
resilience4j.bulkhead.instances.researchServiceCB.maxConcurrentCalls=10
resilience4j.bulkhead.instances.programServiceCB.maxConcurrentCalls=10
resilience4j.bulkhead.instances.notificationServiceCB.maxConcurrentCalls=5


# =====================================================
# ACTUATOR - MONITORING & VISIBILITY
# =====================================================

management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always

# Enable Resilience4j health indicators
management.health.circuitbreakers.enabled=true