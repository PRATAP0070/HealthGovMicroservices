spring.application.name=health-program-service

server.port=4500

#eureka.client.enabled=false
eureka.instance.prefer-ip-address=true
 
spring.datasource.url=jdbc:mysql://localhost:3306/health_program_MSP_db?createDatabaseIfNotExist=true


spring.config.import=optional:configserver:http://localhost:1234


springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false


management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always

