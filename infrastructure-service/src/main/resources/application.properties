spring.application.name=infrastructure-service
server.port=9096

# DATABASE CONNECTION PROPERTIES
spring.datasource.url=jdbc:mysql://localhost:3306/infrastructure_db?createDatabaseIfNotExist=true

 # HIBERNATE PROPERTIES
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always
   
logging.file.name=logs/app.log
logging.file.path=logs
spring.config.import=optional:configserver:http://localhost:1234
#spring.cloud.config.enabled=false
