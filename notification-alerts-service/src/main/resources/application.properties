# 1. IDENTIFICATION & PORT
spring.application.name=notification-alerts-service
server.port=1111

eureka.instance.prefer-ip-address=true

# 2. DISCOVERY & CONFIG (New for Microservices)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# 3. DATABASE CONNECTION (Using your specific password)
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db?createDatabaseIfNotExist=true
spring.cloud.config.enabled=false
#spring.config.import=optional:configserver:http://localhost:1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 5. EMAIL CONFIGURATION (Port 465 SSL Setup)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=virtualboxlinux0@gmail.com
spring.mail.password=smgozwcaneqmrowj
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# Timeouts
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000

# 6. ACTUATOR / MONITORING
management.endpoints.web.exposure.include=*