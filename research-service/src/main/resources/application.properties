spring.application.name=research-service
server.port=7777

spring.cloud.openfeign.circuitbreaker.enabled=true


# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# DB URL only (credentials come from config server)
spring.datasource.url=jdbc:mysql://localhost:3306/research_service_db?createDatabaseIfNotExist=true
spring.config.import=optional:configserver:http://localhost:1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


management.endpoints.web.exposure.include=health,info,circuitbreakers