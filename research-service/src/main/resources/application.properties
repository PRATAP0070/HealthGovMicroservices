spring.application.name=research-service
server.port=7777

spring.cloud.openfeign.circuitbreaker.enabled=true


# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# DB URL only (credentials come from config server)
spring.datasource.url=jdbc:mysql://localhost:3306/research_service_db?createDatabaseIfNotExist=true
spring.config.import=optional:configserver:http://localhost:1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


management.endpoints.web.exposure.include=health,info,circuitbreakers
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always


# ===============================
# CIRCUIT BREAKERS
# ===============================

# Auth Service
resilience4j.circuitbreaker.instances.auth-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.auth-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.auth-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.auth-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.auth-service.permittedNumberOfCallsInHalfOpenState=3

# Notification Alerts Service
resilience4j.circuitbreaker.instances.notification-alerts-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.notification-alerts-service.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.notification-alerts-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.notification-alerts-service.waitDurationInOpenState=5s

# Compliance Audit Service
resilience4j.circuitbreaker.instances.compliance-audit-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.compliance-audit-service.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.compliance-audit-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.compliance-audit-service.waitDurationInOpenState=5s

# ===============================
# FEIGN TIMEOUTS
# ===============================
feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=3000
feign.client.config.default.loggerLevel=BASIC
