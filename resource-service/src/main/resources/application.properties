spring.application.name=resource-service

server.port=9095

# DATABASE CONNECTION PROPERTIES
spring.datasource.url=jdbc:mysql://localhost:3306/resource_db?createDatabaseIfNotExist=true
spring.config.import=optional:configserver:http://localhost:1234

management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always
   
#logging.file.name=logs/app.log
#logging.file.path=logs

#spring.cloud.config.enabled=false
spring.cloud.openfeign.circuitbreaker.enabled=true

resilience4j.circuitbreaker.instances.health-program-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.health-program-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.health-program-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.health-program-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.health-program-service.permittedNumberOfCallsInHalfOpenState=3